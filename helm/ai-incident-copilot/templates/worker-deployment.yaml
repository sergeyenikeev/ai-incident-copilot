apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-incident-copilot.fullname" . }}-worker
  labels:
    {{- include "ai-incident-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ai-incident-copilot.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ai-incident-copilot.name" . }}
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "ai-incident-copilot.fullname" . }}-config
            - secretRef:
                name: {{ include "ai-incident-copilot.fullname" . }}-secret
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "-c", "print('worker alive')"]
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "print('worker ready')"]
            initialDelaySeconds: 10
            periodSeconds: 15
