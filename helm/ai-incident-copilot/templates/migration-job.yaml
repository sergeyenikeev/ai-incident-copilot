{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ai-incident-copilot.fullname" . }}-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
  labels:
    {{- include "ai-incident-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ai-incident-copilot.name" . }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migration
          image: "{{ .Values.migration.image.repository }}:{{ .Values.migration.image.tag }}"
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          command:
            {{- toYaml .Values.migration.command | nindent 12 }}
          env:
            - name: APP_ENV
              value: {{ .Values.config.appEnv | quote }}
            - name: APP_DEBUG
              value: {{ .Values.config.appDebug | quote }}
            - name: APP_LOG_LEVEL
              value: {{ .Values.config.appLogLevel | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.config.postgresHost | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.config.postgresPort | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.config.postgresDb | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.secret.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.secret.postgresPassword | quote }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
