apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-incident-api
  labels:
    app.kubernetes.io/name: ai-incident-copilot
spec:
  # Автоскейлинг включён только для API: worker обычно масштабируется более
  # осознанно с учётом Kafka partitioning и характера нагрузки.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-incident-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
