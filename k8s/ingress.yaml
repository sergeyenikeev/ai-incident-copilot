apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-incident-copilot
  labels:
    app.kubernetes.io/name: ai-incident-copilot
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: ai-incident-copilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-incident-api
                port:
                  number: 80
