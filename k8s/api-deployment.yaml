apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-incident-api
  labels:
    app.kubernetes.io/name: ai-incident-copilot
    app.kubernetes.io/component: api
spec:
  # Для API используем больше одной реплики, потому что HTTP-слой проще
  # масштабируется горизонтально, чем worker с stateful Kafka-consume loop.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-incident-copilot
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-incident-copilot
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/sergeyenikeev/ai-incident-copilot-api:latest
          imagePullPolicy: IfNotPresent
          # В Kubernetes миграции выполняет отдельный Job, поэтому API стартует
          # чистой командой приложения без `alembic upgrade head`.
          command: ["ai-incident-api"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: ai-incident-copilot-config
            - secretRef:
                name: ai-incident-copilot-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
