apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-incident-worker
  labels:
    app.kubernetes.io/name: ai-incident-copilot
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-incident-copilot
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-incident-copilot
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/sergeyenikeev/ai-incident-copilot-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-incident-copilot-config
            - secretRef:
                name: ai-incident-copilot-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "from pathlib import Path; import sys; sys.exit(0 if Path('/tmp/ai-incident-worker.ready').exists() else 1)"]
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "from pathlib import Path; import sys; sys.exit(0 if Path('/tmp/ai-incident-worker.ready').exists() else 1)"]
            initialDelaySeconds: 10
            periodSeconds: 15
