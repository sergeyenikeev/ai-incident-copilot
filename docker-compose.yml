services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-incident-postgres
    environment:
      POSTGRES_DB: ai_incident_copilot
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident -d ai_incident_copilot"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.9
    container_name: ai-incident-kafka
    # Локальный single-node Kafka в KRaft-режиме без внешнего ZooKeeper.
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-incident-api
    # API ждёт доступности Postgres и старта Kafka, чтобы bootstrap был
    # максимально близок к реальному окружению.
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_LOG_LEVEL: INFO
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_incident_copilot
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ai-incident-worker
    # Worker стартует отдельно от API и читает события из того же Kafka broker.
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      APP_LOG_LEVEL: INFO
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_incident_copilot
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"

volumes:
  # Именованный volume сохраняет данные PostgreSQL между перезапусками compose.
  postgres_data:
